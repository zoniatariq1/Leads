<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lead Form</title>
</head>
<body>

<form id="leadForm">

<input type="text" id="name" placeholder="Name" required>
<br><br>

<input type="email" id="email" placeholder="Email" required>
<br><br>

<input type="text" id="phone" placeholder="Phone">
<br><br>

<textarea id="message" placeholder="Message"></textarea>
<br><br>

<button type="submit">Submit</button>

</form>

<div id="status"></div>

<script>

document.getElementById("leadForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const status = document.getElementById("status");

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        message: document.getElementById("message").value
    };

    try {

        const response = await fetch(
            "https://script.google.com/macros/s/AKfycbxRN6CKIU7wLpbFrqIParq7AjtlpSSMHIU9EvqIo0MT0uhLfCDapZRrjO0dDnDPBc8/exec",
            {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(data)
            }
        );

        const result = await response.json();

        if(result.success){

            status.innerHTML = "Lead Saved Successfully";

            document.getElementById("leadForm").reset();

        } else {

            status.innerHTML = "Error Saving Lead";

        }

    } catch(error) {

        console.error(error);

        status.innerHTML = "Submission Failed";

    }

});

</script>

</body>
</html>
